name: Build and Release WAR

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      INSTALL4J_JAVA_HOME_OVERRIDE: /usr/lib/jvm/java-8-openjdk-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install Sencha Cmd
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby unzip openjdk-8-jdk
          curl -fsSL -o /tmp/sencha-cmd.zip "https://cdn.sencha.com/cmd/7.6.0.87/no-jre/SenchaCmd-7.6.0.87-linux-amd64.sh.zip"
          unzip -q /tmp/sencha-cmd.zip -d /tmp/sencha-cmd
          /tmp/sencha-cmd/SenchaCmd-7.6.0.87-linux-amd64.sh -q
          echo "$HOME/bin/Sencha/Cmd/7.6.0.87" >> "$GITHUB_PATH"
        env:
          INSTALL4J_JAVA_HOME_OVERRIDE: /usr/lib/jvm/java-8-openjdk-amd64

      - name: Verify Sencha Cmd
        run: sencha which

      - name: Build CMDBuild WAR
        run: mvn -B clean install -Dmaven.test.skip=true

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmdbuild-war
          path: cmdbuild/target/cmdbuild-*.war
          retention-days: 30

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CMDBuild ${{ steps.get_version.outputs.VERSION }}
          files: cmdbuild/target/cmdbuild-*.war
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
