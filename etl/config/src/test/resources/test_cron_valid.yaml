# yaml-language-server: $schema=http://team.cmdbuild.org/resources/cmdbuild/etl/waterway/config/v1/schema.json
descriptor: test
description: My Test Config
notes:
 my notes !!!
items:
- gate: MyItem
  description: My Item
  notes: something
  handlers:
  - type: script
    script: |
      something

- trigger: MyScheduledTrigger1
  target: MyItem
  cronExpression: '*/2 * * * ?'

- trigger: MyScheduledTrigger2
  target: MyItem
  cronExpression: '10 */2 * * * ?'
  cronExpressionHasSeconds: true

- trigger: MyScheduledTrigger3
  target: MyItem
  cronExpression: '*/2 22 1 * ?'
  cronExpressionHasSeconds: false