openapi: 3.0.0
#info:
#  title: "CMDBuild rest webservices"
#  description: "
#    The following documentation describes the WS REST APIs provided by CMDBuild web application.
#    CMDBuild is an open source web application for the configuration of custom IT and business service management solutions.
#    It is based on a powerful and flexible core that allows you to easily model and manage complex infrastructures and services.
#    The REST APIs allow developers to interact with CMDBuild programmatically, enabling integration with other systems and automation of tasks.
#    "
#  termsOfService: "https://www.cmdbuild.org/en/project/license"
#  license:
#    name: "AGPL-3.0-or-later"
#    url: "https://www.gnu.org/licenses/agpl-3.0.en.html"
#  contact:
#    name: "Contact Us"
#    url: "https://www.cmdbuild.org/en/contacts/contact"
#  version: "4.2"
#servers:
#  - url: "{protocolType}://{host}:{port}/{basePath}/services/rest/v3"
#    description: "CMDBuild REST API server"
#    variables:
#      protocolType:
#        default: https
#        enum:
#          - http
#          - https
#      host:
#        default: localhost
#      port:
#        default: "8080"
#      basePath:
#        default: cmdbuild
#        enum:
#          - cmdbuild
#          - cmdbuild-test
#          - openmaint
#          - openmaint-test
#externalDocs:
#  description: "CMDBuild Official Documentation"
#  url: "https://www.cmdbuild.org/en/documentation"
#extensions:
#  x-logo:
#    url: "https://www.cmdbuild.org/++plone++tecnoteca.cmdbuildtheme2019/logo/logo.png"
#    altText: "CMDBuild Logo"
#  authors:
#    - name: "Pat srl"
#      url: "https://www.pat.eu"
components:
  schemas:
    DefaultLoginExample:
      description: An example of login body
      type: object
      properties:
        username:
          type: string
          default: username
        password:
          type: string
          default: password
        role:
          type: string
          default: roleCode
    DefaultCardExample:
      description: An example of attributes
      type: object
      properties:
        Attribute1:
          type: string
          default: value1 example
        Attribute2:
          type: string
          default: value2 example
    DefaultAttributeCreation:
      type: object
      properties:
        _id:
          type: string
        type:
          type: string
        name:
          type: string
        description:
          type: string
        mode:
          type: string
    DefaultAttributeUpdate:
      type: object
      properties:
        type:
          type: string
        name:
          type: string
        description:
          type: string
        mode:
          type: string
    DefaultXpdlCreation:
      description: An example demonstrating how to create a new process.
      type: object
      properties:
        name:
          type: string
          example: newProcessName
        description:
          type: string
          example: newProcessDescr
        parent:
          type: string
          example: Activity
    DefaultXpdlUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
    DefaultXpdlMigration:
      type: object
      properties:
        provider:
          type: string
          default: river
        file:
          type: string
          format: binary
    DefaultProcessTaskLayoutUpdate:
      description: An example demonstrating how to update the layout of a process task
      type: object
      properties:
        formStructure:
          type: object
          properties:
            active:
              type: boolean
              example: true
            form:
              type: object
              properties:
                _nogroup:
                  type: object
                  properties:
                    rows:
                      type: array
                      items:
                        type: object
                        properties:
                          columns:
                            type: array
                            items:
                              type: object
                              properties:
                                fileds:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      attribute:
                                        type: string
    DefaultRelationCreationUpdate:
      description: An example demonstrating how to create a new relation between a CI and an InternalEmployee, starting from the InternalEmployee class.
      type: object
      properties:
        _type:
          description: Name of the domain
          type: string
          example: domainId
        _destinationId:
          description: Id of the card.
          type: string
          example: 123
        _destinationType:
          description: Name of the destination class.
          type: string
          example: DstClass
        _sourceType:
          description: Name of the source class
          type: string
          example: SrcClass
        _sourceId:
          description: Id of the card.
          type: integer
          format: int64
          minimum: 0
          example: 456
        _is_direct:
          description: It refers to the direction of the domain.
          type: boolean
          example: true
    DefaultEmailTemplateDataExample:
      type: object
      properties:
        contentType:
          type: string
          default: text/html
        keepSynchronization:
          type: boolean
          default: false
        from:
          type: string
          default: exampleFrom@gmail.com
    DefaultEmailAttachmentExample:
      type: object
      properties:
        file:
          type: string
          format: binary
    DefaultEmailDataExample:
      type: object
      properties:
        contentType:
          type: string
          default: text/html
        keepSynchronization:
          type: boolean
          default: false
        from:
          type: string
          default: exampleFrom@gmail.com
        to:
          type: string
          default: exampleTo@gmail.com
        cc:
          type: string
        body:
          type: string
          default: Example of a body
        subject:
          type: string
          default: Example of a subject
    DefaultEmailDataUpdateExample:
      type: object
      properties:
        contentType:
          type: string
          default: text/html
        keepSynchronization:
          type: boolean
          default: false
        from:
          type: string
          default: exampleFrom@gmail.com
        to:
          type: string
          default: exampleTo@gmail.com
        cc:
          type: string
        body:
          type: string
          default: Example of an updated body
        subject:
          type: string
          default: Example of an updated subject
    DefaultAttachmentExample:
      type: object
      properties:
        file:
          type: string
          format: binary
        attachment:
          type: object
          properties:
            category:
              type: integer
              example: 11
            Code:
              type: string
              example: attachment_code
            Description:
              type: string
              example: attachment_descr
            majorVersion:
              type: boolean
              default: true
    DefaultLookupTypeCreationExample:
      description: An example demonstrating how to create a new Lookup type.
      type: object
      properties:
        name:
          type: string
          example: my_lookup_type
        parent:
          type: string
          example: null
    DefaultLookupValueCreationUpdateExample:
      description: Example of how to use create new lookup values
      type: object
      properties:
        code:
          type: string
          example: yourLookupCode
        description:
          type: string
          example: yourLookupDescription
        active:
          type: boolean
          example: true
        note:
          type: string
          example: yourLookupNotes
        icon_type:
          type: string
          example: null
        icon_image:
          type: string
          example: null
        icon_font:
          type: string
          example: null
        icon_color:
          type: string
          example: null
        text_color:
          type: string
          example: null
        index:
          type: integer
          format: int64
          minimum: 0
          example: 0
    DefaultLookupValueFilterExample:
      description: Example of how to use filters on Lookup values
      type: object
      properties:
        ecql:
          type: object
          properties:
            id:
              type: string
              example: yourEcqlId
            context:
              type: string
              example: '{"client":{},"server":{}}'
    DefaultFilterExample:
      description: Example of how to compose Filters
      type: object
      properties:
        attribute:
          type: object
          properties:
            and:
              type: array
              items:
                type: object
                properties:
                  simple:
                    type: object
                    properties:
                      attribute:
                        type: string
                      operator:
                        type: string
                      value:
                        type: array
                        items:
                          type: string
    DefaultSortExample:
      description: Example of how to order the result based on the selected attribute
      type: string
      example: AttributeToOrder
    DefaultLimitExample:
      description: Example of how many records to return. If blank it will return all the records
      type: integer
      format: int4
      minimum: 0
      example: 100
    DefaultAttributeDetailedExample:
      description: If true it will show the detailed data (code and description) for reference and lookup attributes
      type: boolean
    DefaultHistoryChangesExample:
      description: Example of an attribute that must be returned when querying through history. Only one attribute can be returned
      type: string
      default: Code
    DefaultHistoryTypesExample:
      description: Example of types that can be applied on Card and Process history separated by comma
      type: string
      example: cards
    DefaultDomainFilterExample:
      description: Example of filters used for domains
      type: object
      properties:
        attribute:
          type: object
          properties:
            simple:
              type: object
              properties:
                attribute:
                  description: destination or source
                  example: destination
                operator:
                  description: equal or in
                  example: equal
                value:
                  description: Name of the class
                  example: ClassName
    DefaultDomainCreationUpdateExample:
      description: Example of how to create or update domains
      type: object
      properties:
        name:
          type: string
          example: DomainName
        description:
          type: string
          example: DomainDescription
        source:
          type: string
          example: SourceClass
        destination:
          type: string
          example: DestinationClass
        cardinality:
          type: string
          example: N:N
        descriptionDirect:
          type: string
          example: DirectDescription
        descriptionInverse:
          type: string
          example: InverseDescription
        cascadeActionDirect:
          type: string
          example: restrict
        cascadeActionInverse:
          type: string
          example: delete
    DefaultDomainWithECQLFilterCreationUpdate:
      description: Example of how to create or update domains with the possibility of adding an ecql filter
      type: object
      properties:
        name:
          type: string
          example: DomainName
        description:
          type: string
          example: DomainDescription
        source:
          type: string
          example: SourceClass
        destination:
          type: string
          example: DestinationClass
        cardinality:
          type: string
          example: N:N
        descriptionDirect:
          type: string
          example: DirectDescription
        descriptionInverse:
          type: string
          example: InverseDescription
        cascadeActionDirect:
          type: string
          example: restrict
        cascadeActionInverse:
          type: string
          example: delete
        inClassReferenceFilters:
          type: object
          properties:
            sourceFilter:
              description: cql filter defined for the source class
              type: string
              example: from < sourceClass > where < attribute > = < value >
            destinationFilter:
              description: cql filter defined for the destination class
              type: string
              example: from < destinationClass > where < attribute > = < value >
    DefaultEmailAccountCreationUpdateExample:
      description: Example of how to create or update an email account
      type: object
      properties:
        name:
          description: Name of the account
          type: string
          example: default
        maxAttachmentSizeForEmail:
          description: Refers to the maximum numbers of attachment size that the account can upload for email
          type: string
          example: null
        default:
          description: Indicates whether the account is setted as default
          type: boolean
          default: true
        username:
          description: Refers to the username of the account
          type: string
          example: test@example.com
        password:
          description: Refers to the password of the account
          type: string
          format: password
          example: test2024
        address:
          description: Refers to the email address of the account
          type: string
          example: test@example.com
        smtp_server:
          description: Refers to the SMTP server
          type: string
          example: smtp.example.com
        smtp_port:
          description: Refers to the SMTP port
          type: integer
          example: 25
        smtp_ssl:
          description: Indicates whether the SSL is enabled for the incoming emails
          type: boolean
          default: false
        smtp_starttls:
          description: Indicates whether the STARTTLS is enabled for the incoming emails
          type: boolean
          default: false
        imap_output_folder:
          description: Refers to the folder where the emails are sent
          type: string
          example: null
        imap_server:
          description: Refers to the IMAP server
          type: string
          example: imap.example.com
        imap_port:
          description: Refers to the IMAP port
          type: integer
          example: 143
        imap_ssl:
          description: Indicates whether the SSL is enabled for the outgoing emails
          type: boolean
          default: false
        imap_starttls:
          description: Indicates whether the STARTTLS is enabled for the outgoning emails
          type: boolean
          default: false
        auth_type:
          description: Refers to the authentication type
          type: string
          example: default
        active:
          description: Indicates whether the account is active
          type: boolean
          default: true
    DefaultEmailFilter:
      description: An example of how to correctly filter the templates.
      type: object
      properties:
        attribute:
          type: object
          properties:
            simple:
              type: object
              properties:
                attribute:
                  type: string
                  example: provider
                operator:
                  type: string
                  example: equal
                value:
                  type: string
                  example: chat
    DefaultTemplateCreationUpdateExample:
      description: An example of how to correctly create or update a template
      type: object
      properties:
        name:
          description: Name of the email template
          type: string
          example: YourTemplateName
        description:
          description: Description of the email template
          type: string
          example: Your template name
        provider:
          description: Provider of the template (email, chat, mobile)
          type: string
          example: email
        _can_write:
          type: boolean
          default: true
        _description_translation:
          description: Translation of the description
          type: string
          example: Your template name translation
        from:
          description: Refers to the parameter From Address defined on the template
          type: string
          example: from_address@test.com
        to:
          description: Refers to the parameter To Address defined on the template
          type: string
          example: to_address@test.com
        cc:
          description: Refers to the parameter CC defined on the template
          type: string
          example: cc_address@test.com
        bcc:
          description: Refers to the parameter BCC defined on the template
          type: string
          example: bcc_address@test.com
        subject:
          description: Refers to the subject of the email
          type: string
          example: Email subject test
        body:
          description: Refers to the body of the email
          type: string
          example: Email body test
        contentType:
          description: Refers to the content type of the email
          type: string
          example: text/html
        account:
          description: Refers to the default account. If the From parameter is not defined, the email address of the account will be
          type: integer
          format: int64
          minimum: 0
          example: null
        signature:
          description: Refers to the default signature that will be used for the mail
          type: integer
          format: int64
          minimum: 0
          example: null
        keepSynchronization:
          type: boolean
          default: true
        promptSynchronization:
          type: boolean
          default: true
        delay:
          description: Refers to the delay of the email
          type: integer
          example: 0
        active:
          description: Indicates whether the template is active
          type: boolean
          example: true
        showOnClasses:
          type: string
          example: ClassName
    DefaultSignatureCreationUpdateExample:
      description: An example of how to correctly create or update a signature
      type: object
      properties:
        code:
          description: Code of the signature
          type: string
          example: YourSignatureCode
        description:
          description: Description of the signature
          type: string
          example: Your signature description
        _description_translation:
          description: Translation of the signature's description
          type: string
          example: Your signature description tranlation
        active:
          description: Indicates whether the signature is active
          type: boolean
          example: true
        _default:
          description: Indicates whether the signature is the one used as default
          type: boolean
          example: false
        content_html:
          description: Refers to the content of the signature
          type: string
          example: "<b>Your signature content</b>"
        _content_html_translation:
          description: Refers to the translation of the signature's content
          type: string
          example: "<b>Your signature content translation</b>"
    DefaultEmailUpdateExample:
      description: An example of how to correctly update an email.
      type: object
      properties:
        from:
          description: Refers to the from address
          type: string
          example: FromAddress@example.com
        replyTo:
          description: Refers to the address to which one is responding
          type: string
          example: null
        to:
          description: Refers to the to address
          type: string
          example: ToAddress@example.com
        cc:
          description: Refers to the addresses that are defined in CC
          type: string
          example: CCAddress@example.com
        bcc:
          description: Refers to the addresses that are defined in BCC
          type: string
          example: BCCAddress@example.com
        subject:
          description: Referso to the email subject
          type: string
          example: Email subject example
        contentType:
          description: Refers to the content type of the email
          type: string
          example: text/html
        date:
          description: It refers to the date on which the email was sent.
          type: string
          format: date-time
          example: 2024-07-19T07:58:11.035179Z
        status:
          description: Refers to the status of the email.
          type: string
          example: error
        delay:
          description: Refers to the delay of the email
          type: integer
          format: int64
          minimum: 0
          example: 0
        keepSynchronization:
          type: boolean
          example: false
        promptSynchronization:
          type: boolean
          example: false
        isReadByUser:
          description: Indicates whether the recipient has read the email.
          type: boolean
          example: false
        template:
          description: Refers to the id of the template that was used when the email was composed.
          type: integer
          format: int64
          minimum: 0
          example: null
        _hasTemplateAttachments:
          description: Indicates whether the tempalte has attachments
          type: boolean
          example: false
        account:
          description: Refers to the default account. If the From parameter is not defined, the email address of the account will be
          type: integer
          format: int64
          minimum: 0
          example: null
        signature:
          description: Refers to the default signature that will be used for the mail
          type: integer
          format: int64
          minimum: 0
          example: null
        autoReplyTemplate:
          description: Refers to the id of the template that is used as auto reply
          type: integer
          format: int64
          minimum: 0
          example: null
        body:
          description: Refers to the body of the email
          type: string
          example: <b>Email body test</b>
        _content_plain:
          description: Refers to the body as plain text
          type: string
          example: Email body test
        _content_html:
          description: Refers to the body as html
          type: string
          example: <b>Email body test&lt</b>
        card:
          description: Refers to the id of the card where the mail is attached
          type: integer
          format: int64
          minimum: 0
          example: 123456
    DefaultRelationCopyExample:
      description: Example of how to correctly use the /copy call on relations
      type: object
      properties:
        source:
          description: Refers to the id of the card from which to copy the data.
          type: string
          example: CardId
        destination:
          description: Refers to the id of the card where
          type: string
          example: DstCardId
        domains:
          type: array
          items:
            type: object
            properties:
              _id:
                description: Refers to the name of the domain
                type: string
                example: DomainName
              direction:
                description: Refers to the direction of the domain
                type: string
                example: direct
    DefaultRelationMoveExample:
      description: Example of how to correctly use the /move call on relations
      type: object
      properties:
        source:
          description: Refers to the id of the card from which to copy the data.
          type: string
          example: CardId
        destination:
          description: Refers to the id of the card where
          type: string
          example: DstCardId
        domains:
          type: array
          items:
            type: object
            properties:
              _id:
                description: Refers to the name of the domain
                type: string
                example: DomainName
              direction:
                description: Refers to the direction of the domain
                type: string
                example: direct
    DefaultDmsCategoryCreateUpdateExample:
      description: Example of how to correctly create or update a dms category
      type: object
      properties:
        name:
          description: Refers to the name of the dms category
          type: string
          example: YourDmsCategoryName
        parent:
          description: Refers to the parent of the lookup, by default it is null
          type: string
          example: null
        specialty:
          description: Refers to the specialty of the lookup. For the DMS Categories it is setted to dmscategory
          type: string
          example: dmscategory
        accessType:
          type: string
          example: default
    DefaultDmsCategoryValueCreateUpdateExample:
      description: Example of how to correctly create or update a dms category value
      type: object
      properties:
        code:
          description: Refers to the code of the value
          type: string
          example: YourDmsCategoryValueCode
        description:
          description: Refers to the description of the value
          type: string
          example: Your dms category value description
        _description_translation:
          description: Refers to the translation of the description
          type: string
          example: Your dms category value description translation
        index:
          description: Indicates the index of the value
          type: integer
          format: int8
          minimum: 0
          example: 0
        active:
          description: Indicates whether the value is active
          type: boolean
          default: true
        note:
          description: Refers to the note of the value
          type: string
          example: <b>Example of notes</b>
        icon_type:
          description: Indicates the format of the icon. It is not required
          type: string
          example: null
        icon_image:
          description: Indicates the image of the icon
          type: string
          example: null
        accessType:
          type: string
          example: default
        modelClass:
          description: Refers to the dms model. By default is BaseDocument
          type: string
          example: BaseDocument
        allowedExtensions:
          description: Inidicates the allowed attachment extension for the value separated by comma
          type: string
          example: png,pdf
        checkCount:
          description: It refers to the checks that are performed on the attachments with that value, the checks are no_check, at_least_number, exactly_number or max_number
          type: string
          example: exactly_number
        checkCountNumber:
          description: Indicates the number of attachments needed to meet the checkCount condition.
          type: integer
          format: int8
          minimum: 0
          example: 2
        maxFileSize:
          description: It refers to the maximum allowed size for attachments (expressed in MB).
          type: integer
          minimum: 0
          example: 500
    DefaultDmsModelFilterExample:
      description: An example of how to correctly compose filters for dms model
      type: object
      properties:
        attribute:
          type: object
          properties:
            simple:
              type: object
              properties:
                attribute:
                  type: string
                  example: name
                operator:
                  type: string
                  example: equal
                value:
                  type: string
                  example: BaseDocument
    DefaultDmsModelCreationUpdateExample:
      description: Example of how to correctly create a new dms
      type: object
      properties:
        name:
          description: Name of the model
          type: string
          example: NewDmsModelName
        description:
          description: Description of the model
          type: string
          example: New dms model description
        parent:
          description: Parent of the model, by default is DmsModel
          type: string
          example: DmsModel
        prototype:
          type: boolean
          example: false
        active:
          description: Indicates whether the model is active
          type: boolean
          example: true
        attributeGroups:
          description: Refers to the attribute group of the model
          type: array
          example: [ ]
        multitenantMode:
          description: Refers to the tenant mode of the model
          type: string
          example: never
        _icon:
          description: Refers to the id of the icon
          type: integer
          format: int64
          minimum: 0
          example: null
        noteInlineClosed:
          description: Indicates whether the inline notes are collapsed by default
          type: boolean
          example: true
        allowedExtensions:
          description: Refers to the allowed extensions of the files separated by comma
          type: string
          example: pdf
        checkCount:
          description: It refers to the checks that are performed on the attachments with that value, the checks are no_check, at_least_number, exactly_number or max_number
          type: string
          example: exactly_number
        checkCountNumber:
          description: Indicates the number of attachments needed to meet the checkCount condition.
          type: integer
          format: int8
          minimum: 0
          example: 2
        validationRule:
          description: Refers to the validation rules that are defined on the model
          type: string
          example: ""
        help:
          description: Refers to the help text defined on the model
          type: string
          example: ""
        maxFileSize:
          description: It refers to the maximum allowed size for attachments (expressed in MB).
          type: integer
          minimum: 0
          example: 500
        attachmentsInlineClosed:
          description: Indicates whether the inline attachments are collapsed by default
          type: boolean
          example: false
        _multitenantMode_description:
          description: Refers to the description of the tanant mode
          type: string
          example: Never
        widgets:
          description: Refers to the widgets that are defined on the model
          type: array
          example: [ ]
        formTriggers:
          description: Refers to the form triggers that are defined on the model
          type: array
          example: [ ]
    DefaultDmsModelAttrbuteCreateUpdateExample:
      description: An example of how to correctly create new attribute on dms models
      type: object
      properties:
        type:
          description: Indicates the type of the attribute
          type: string
          example: string
        editorType:
          description: Indicates the editor for textual attributes
          type: string
          example: PLAIN
        name:
          description: Indicates the name of the attribute
          type: string
          example: AttributeName
        mode:
